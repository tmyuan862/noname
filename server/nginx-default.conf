server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /home/ubuntu/noname;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/feedback {
        limit_except POST { deny all; }
        client_max_body_size 4k;
        proxy_pass http://127.0.0.1:8787/feedback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /admin {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        return 302 /admin.html;
    }

    location = /admin.html {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        try_files /admin.html =404;
    }

    location /api/admin/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8787/admin/;
        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
