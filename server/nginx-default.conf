limit_req_zone $binary_remote_addr zone=resource_list:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=resource_detail:10m rate=10r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /home/ubuntu/noname;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/feedback {
        limit_except POST { deny all; }
        client_max_body_size 4k;
        proxy_pass http://127.0.0.1:8787/feedback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /api/feedback/reply {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8787/feedback/reply;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /api/feedback/public {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8787/feedback/public;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /api/resources {
        limit_req zone=resource_list burst=10 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass http://127.0.0.1:8787/resources;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /api/resources/ {
        limit_req zone=resource_detail burst=10 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;
        proxy_pass http://127.0.0.1:8787/resources/;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /api/game/ {
        client_max_body_size 4k;
        proxy_pass http://127.0.0.1:8787/game/;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /api/senior/ {
        client_max_body_size 20k;
        proxy_pass http://127.0.0.1:8787/senior/;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location = /api/site-chat {
        limit_except POST { deny all; }
        client_max_body_size 8k;
        proxy_pass http://127.0.0.1:8787/site-chat;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location = /admin {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        return 302 /admin.html;
    }

    location = /admin.html {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        try_files /admin.html =404;
    }

    location = /resources-admin.html {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        try_files /resources-admin.html =404;
    }

    location = /game-admin.html {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        try_files /game-admin.html =404;
    }

    location = /senior-admin.html {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        try_files /senior-admin.html =404;
    }

    location /api/admin/ {
        auth_basic "Mengyuan Admin";
        auth_basic_user_file /etc/nginx/.mengyuan-admin.htpasswd;
        client_max_body_size 2m;
        proxy_pass http://127.0.0.1:8787/admin/;
        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
