<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>资料库管理 · 梦缘资源站</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/resources-admin.css" />
    <link rel="stylesheet" href="css/resources-paste.css" />
  </head>
  <body>
    <header class="admin-header"><div><span class="admin-mark">梦</span><strong>管理后台</strong></div><nav><a href="admin.html">反馈</a><a class="active" href="resources-admin.html">资料库</a><a href="game-admin.html">排行榜</a><a href="senior-admin.html">学长学姐说</a><a href="resources.html">查看资料库</a></nav></header>
    <main class="admin-shell">
      <section class="admin-title"><div><p>CONTENT CONSOLE</p><h1>学生资料库</h1><span>上传 JSON 后按原文链接自动新增或覆盖</span></div><button type="button" data-refresh>刷新数据</button></section>
      <section class="upload-panel">
        <div><strong>导入资料</strong><p>支持原资料库中的 JSON 数组文件；单次最多 500 条、2MB。</p></div>
        <label class="file-picker"><input type="file" accept="application/json,.json" multiple data-file-input /><span>选择 JSON 文件</span></label>
        <button class="import-button" type="button" data-import disabled>开始导入</button>
        <p class="upload-status" data-upload-status role="status" aria-live="polite">尚未选择文件</p>
      </section>
      <section class="paste-panel">
        <div class="paste-heading"><div><strong>智能资料工作台</strong><p>可以粘贴通知全文，也可以直接输入公开网页链接。DeepSeek 只负责结构化整理，发布前仍由你确认。</p></div><span>抓取 → 分析 → 核对 → 发布</span></div>
        <div class="source-mode" aria-label="资料来源方式">
          <button class="active" type="button" data-source-mode="text">粘贴文字</button>
          <button type="button" data-source-mode="url">分析网页</button>
        </div>
        <div data-source-panel="text">
          <label class="paste-input"><span>收到的通知内容</span><textarea data-paste-text maxlength="100000" placeholder="把公众号通知、群消息或官网通知全文粘贴到这里……"></textarea></label>
          <div class="paste-actions"><div class="analysis-mode" aria-label="分析方式"><button type="button" data-analysis-mode="local">本地</button><button class="active" type="button" data-analysis-mode="ai">AI 增强</button></div><button type="button" data-analyze>分析内容</button></div>
        </div>
        <div class="web-source-panel" data-source-panel="url" hidden>
          <label class="web-source-input"><span>公开网页链接</span><input type="url" data-web-url placeholder="https://学校官网或公开文章链接" /></label>
          <div class="web-source-note"><strong>自动处理</strong><span>抓取网页标题、正文和图片，交给 DeepSeek 分类、摘要并挑选有用图片。</span></div>
          <button type="button" data-analyze-url>抓取并分析网页</button>
        </div>
        <p class="paste-status" data-paste-status role="status" aria-live="polite">尚未分析</p>
        <form class="analysis-preview" data-analysis-preview hidden>
          <div class="preview-head"><strong>识别结果</strong><span>发布前请核对，带 * 的字段必须填写</span></div>
          <label class="wide"><span>发布目标 *</span><select name="publish_target" required><option value="resources">校园资料库</option><option value="senior">学长学姐说 · 梦缘校园整理员</option></select></label>
          <label class="wide"><span>标题 *</span><input name="title" maxlength="300" required /></label>
          <label><span>分类 *</span><select name="category" required><option value="activity_competition">活动竞赛</option><option value="course_selection">选课通知</option><option value="exchange">交流交换</option><option value="fees">费用缴纳</option><option value="holiday">假期安排</option><option value="library">图书馆</option><option value="registration">报到注册</option><option value="safety">安全提示</option><option value="transportation">校园交通</option><option value="other">其他</option></select></label>
          <label><span>发布日期</span><input name="publish_date" type="date" /></label>
          <label class="wide"><span>发布部门</span><input name="department" maxlength="120" placeholder="例如：后勤保障处" /></label>
          <label class="wide"><span>官网原文链接 *</span><input name="url" type="url" maxlength="1000" required placeholder="https://… 没有信源链接时不能发布" /></label>
          <label class="wide"><span>网页图片</span><textarea name="image_urls" rows="4" placeholder="每行一个图片链接；网页分析后会自动填入，可删减。"></textarea></label>
          <label class="wide"><span>正文 *</span><textarea name="content" maxlength="100000" required></textarea></label>
          <div class="preview-actions wide"><button type="button" data-cancel-analysis>取消</button><button class="publish-button" type="submit">确认发布</button></div>
        </form>
      </section>
      <section class="resource-admin-section">
        <div class="resource-admin-head"><strong>已发布资料</strong><div><span data-resource-count>0 条</span><button type="button" data-reformat-resources>AI 整理全部排版</button></div></div>
        <div class="admin-resource-list" data-admin-resources><p class="loading-state">正在读取资料……</p></div>
      </section>
    </main>
    <template id="admin-resource-template"><article class="admin-resource-item"><div><span data-category></span><time data-date></time></div><h2 data-title></h2><a data-source target="_blank" rel="noopener noreferrer">原文</a><button type="button" data-delete>删除</button></article></template>
    <script src="js/resources-admin.js"></script>
  </body>
</html>
