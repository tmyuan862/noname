<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>学长学姐作者工作台 · 梦缘资源站</title><link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/senior-workspace.css"></head><body>
<header class="workspace-header"><a href="senior.html">← 学长学姐说</a><strong>作者工作台</strong></header><main class="workspace-shell">
<section class="auth-panel" data-login-panel><p>AUTHORIZED CONTRIBUTORS</p><h1>作者登录</h1><form data-login-form><label>账号<input name="username" autocomplete="username" required></label><label>密码<input name="password" type="password" autocomplete="current-password" required></label><button type="submit">登录</button><span data-login-status role="status"></span></form></section>
<section data-workspace hidden><div class="workspace-title"><div><p>CONTRIBUTOR DESK</p><h1 data-welcome></h1></div><button type="button" data-logout>退出</button></div>
<form class="password-panel" data-password-form hidden><strong>首次登录，请先修改初始密码</strong><label>当前密码<input name="current_password" type="password" required></label><label>新密码<input name="new_password" type="password" minlength="10" required></label><button type="submit">修改密码</button><span data-password-status></span></form>
<form class="post-editor" data-post-form><label>标题<input name="title" minlength="4" maxlength="120" required placeholder="例如：给新生的第一学期选课建议"></label><label>正文<textarea name="body" minlength="20" maxlength="10000" required placeholder="写下真实经历、适用条件和必要提醒……"></textarea></label><div><span>提交后由站长审核，公开前可以重新投稿修订版。</span><button type="submit">提交审核</button></div><p data-post-status role="status"></p></form>
<section class="my-posts"><h2>我的投稿</h2><div data-my-posts></div></section></section></main><script src="js/senior-workspace.js"></script></body></html>
